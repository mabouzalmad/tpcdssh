name: CI/CD flask Docker
on:
  push:
    branches: 
        - main
jobs:
  ci:  
    name: Build and Test  
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v3
      - name: Set up Python 
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
            pip install -r requirements.txt
  cd:
    name: Docker Build & deploy
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: checkout repository
        uses: actions/checkout@v3
      - name: Set up Docker 
        uses: docker/setup-buildx-action@v2
      - name: Login  Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push Docker Image
        run: |
          docker build -t manal456/flask_devops_demo:latest .
          docker push manal456/flask_devops_demo:latest
      - name: Deploy via SSH
        run: |
          echo "${{ secrets.SSH_KEY }}" > key.pem chmod 600 key.pem ssh -i key.pem -o StrictHostKeyChecking=no "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \ " 
          powershell -Executionpolicy Bypass -File 'C:\\Users\\pc\\tpcdssh\\deploy.ps1' -DOCKERUser ${{ secrets.DOCKER_USERNAME }} -DOCKERToken ${{ secrets.DOCKER_PASSWORD }} "
    
        
        
